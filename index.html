<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Eternal Story</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Playfair+Display:ital,wght@0,400;1,600&display=swap" rel="stylesheet">
    <style>
        :root {
            --rose: #ff4d6d;
            --soft-pink: #ffb3c1;
            --gold: #f9d423;
        }

        body, html {
            margin: 0; padding: 0;
            background: #0b0d17; /* Solid fallback */
            background: radial-gradient(circle at center, #1a0a1a 0%, #050508 100%);
            font-family: 'Playfair Display', serif;
            color: #fff5f5;
            overflow-x: hidden;
        }

        /* GPU Accelerated Canvas */
        canvas {
            position: fixed;
            top: 0; left: 0;
            pointer-events: none;
            z-index: 1;
            transform: translateZ(0); /* Force GPU layer */
        }

        .content-wrapper {
            position: relative;
            z-index: 10;
            max-width: 900px;
            margin: 0 auto;
            text-align: center;
            padding: 40px 20px;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: clamp(3rem, 10vw, 5rem);
            margin: 0;
            color: var(--soft-pink);
            text-shadow: 0 0 15px rgba(255, 77, 109, 0.4);
        }

        .names {
            font-size: 1.5rem;
            letter-spacing: 5px;
            color: var(--gold);
            text-transform: uppercase;
            margin-bottom: 40px;
        }

        .milestone-card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 179, 193, 0.15);
            border-radius: 30px;
            padding: 30px 15px;
            margin-bottom: 40px;
            backdrop-filter: blur(4px); /* Light blur for better performance */
        }

        .label {
            font-family: 'Dancing Script', cursive;
            font-size: 2rem;
            color: var(--soft-pink);
            margin-bottom: 20px;
        }

        .live-clock {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            max-width: 500px;
            margin: 0 auto;
        }

        @media (min-width: 600px) {
            .live-clock { grid-template-columns: repeat(6, 1fr); }
        }

        .unit-value {
            font-size: 1.8rem;
            font-weight: 600;
            display: block;
            color: white;
        }

        .unit-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            color: var(--gold);
            display: block;
        }

        .tree-svg {
            width: 120px;
            height: 120px;
            margin: 20px auto;
            /* Static pulse to save CPU */
            animation: pulse 5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.7; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
        }
    </style>
</head>
<body>

    <canvas id="mainCanvas"></canvas>

    <div class="content-wrapper">
        <h1>Our Journey</h1>
        <div class="names">Nicole & Joey</div>

        <svg class="tree-svg" viewBox="0 0 100 100">
            <path d="M50,95 L50,65 M50,75 L35,60 M50,80 L65,65" stroke="#3d2117" stroke-width="3" fill="none"/>
            <path d="M50,25 C35,25 25,40 50,65 C75,40 65,25 50,25" fill="var(--rose)" opacity="0.8"/>
        </svg>

        <div id="milestones">
            <div class="milestone-card" data-date="2015-01-05T13:14:52">
                <div class="label">The moment we met...</div>
                <div class="live-clock"></div>
            </div>

            <div class="milestone-card" data-date="2015-02-14T21:13:14">
                <div class="label">Since our first date...</div>
                <div class="live-clock"></div>
            </div>

            <div class="milestone-card" data-date="2017-08-21T11:00:00">
                <div class="label">Since we said "I Do"...</div>
                <div class="live-clock"></div>
            </div>
        </div>
    </div>

    <script>
        // --- High Efficiency Particle Engine ---
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d', { alpha: false }); // Optimize for non-transparent canvas
        let particles = [];

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = [];
            for (let i = 0; i < 60; i++) { // Reduced count for efficiency
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    s: Math.random() * 2 + 1,
                    vel: Math.random() * 0.5 + 0.2,
                    type: i % 3 // 0: Star, 1: Petal, 2: Heart
                });
            }
        }

        function animate() {
            // Using a solid fill instead of clearRect is sometimes faster for GPUs
            ctx.fillStyle = '#0b0d17';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            particles.forEach(p => {
                ctx.globalAlpha = 0.6;
                if (p.type === 0) {
                    ctx.fillStyle = "#fff";
                    ctx.beginPath(); ctx.arc(p.x, p.y, p.s / 2, 0, 6.28); ctx.fill();
                } else if (p.type === 1) {
                    ctx.fillStyle = "#ffb3c1";
                    ctx.beginPath(); ctx.ellipse(p.x, p.y, p.s * 2, p.s, 0.5, 0, 6.28); ctx.fill();
                } else {
                    ctx.fillStyle = "#ff4d6d";
                    ctx.fillText('❤', p.x, p.y);
                }

                p.y += p.vel;
                if (p.y > canvas.height) p.y = -10;
            });
            requestAnimationFrame(animate);
        }

        // --- Precise Year/Month Timer Logic ---
        function getPreciseTime(pastDate) {
            const now = new Date();
            const past = new Date(pastDate);
            
            let years = now.getFullYear() - past.getFullYear();
            let months = now.getMonth() - past.getMonth();
            let days = now.getDate() - past.getDate();

            if (days < 0) {
                months--;
                const lastMonth = new Date(now.getFullYear(), now.getMonth(), 0);
                days += lastMonth.getDate();
            }
            if (months < 0) {
                years--;
                months += 12;
            }

            const diffMs = now - past;
            const hrs = Math.floor((diffMs / 3600000) % 24);
            const mins = Math.floor((diffMs / 60000) % 60);
            const secs = Math.floor((diffMs / 1000) % 60);

            return { Yrs: years, Mon: months, Day: days, Hrs: hrs, Min: mins, Sec: secs };
        }

        function updateClocks() {
            document.querySelectorAll('.milestone-card').forEach(card => {
                const data = getPreciseTime(card.getAttribute('data-date'));
                card.querySelector('.live-clock').innerHTML = Object.entries(data).map(([k, v]) => `
                    <div class="time-unit">
                        <span class="unit-value">${v}</span>
                        <span class="unit-label">${k}</span>
                    </div>
                `).join('');
            });
        }

        window.addEventListener('resize', init);
        init();
        animate();
        setInterval(updateClocks, 1000);
        updateClocks();
    </script>
</body>
</html>
